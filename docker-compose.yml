services:
  postgres:
    image: postgres:16.8
    environment:
      POSTGRES_USER: autopatch
      POSTGRES_PASSWORD: autopatch_dev
      POSTGRES_DB: autopatch
    ports:
      - "5432:5432"
    volumes:
      - autopatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autopatch:autopatch_dev@postgres:5432/autopatch
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./dashboard/src:/app/src

volumes:
  autopatch_pgdata:
